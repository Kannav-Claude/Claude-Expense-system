{% extends "base.html" %}

{% block title %}Server Error - Spendly{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-box">
        <h1 class="error-code">500</h1>
        <h2>Server Error</h2>
        <p>Something went wrong on our end. We're working to fix it.</p>
        <a href="{{ url_for('landing') }}" class="btn btn-primary">Go Home</a>
    </div>
</div>

<style>
    .error-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
        padding: 2rem;
    }

    .error-box {
        text-align: center;
        background: var(--paper-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 3rem 2rem;
        max-width: 500px;
    }

    .error-code {
        font-family: var(--font-display);
        font-size: 4rem;
        color: var(--danger);
        margin-bottom: 0.5rem;
        line-height: 1;
    }

    .error-box h2 {
        font-family: var(--font-display);
        font-size: 1.8rem;
        margin-bottom: 1rem;
        color: var(--ink);
    }

    .error-box p {
        color: var(--ink-muted);
        margin-bottom: 2rem;
        font-size: 1rem;
    }

    .btn {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: var(--accent);
        color: white;
        border-radius: var(--radius-sm);
        font-weight: 500;
        transition: all 0.2s ease;
        text-decoration: none;
    }

    .btn:hover {
        background: #0d3820;
    }
</style>
{% endblock %}
